# P Skills — 外部依赖清单
#
# 本文件定义了 skill 体系依赖的外部工具和 MCP 服务器。
# 安装脚本会根据本文件自动安装和配置依赖。
#
# 注意：我们是独立的 skill 仓库，不依赖外部 skill。
# 只依赖必要的工具和 MCP 服务器。
#
# 格式说明：
#   name: 依赖名称（唯一标识）
#   type: 依赖类型（mcp | tool）
#   description: 简要描述
#   source: 安装来源
#     github: GitHub 仓库地址
#     npm: npm 包名
#     pip: pip 包名
#     pypi: PyPI 包名（使用 uv/pip 安装）
#     brew: Homebrew 包名
#     manual: 手动安装
#   version: 版本号（可选）
#   config: 配置项（可选）
#   required: 是否必需（true | false）
#   tags: 标签（用于分类）

# ============================================================
# MCP 服务器
# ============================================================
mcp_servers:
  - name: codegraph
    type: mcp
    description: 代码知识图谱，提供符号搜索、调用关系、影响分析
    source:
      github: "https://github.com/colbymchenry/codegraph"
    install:
      command: "npm"
      args: ["install", "-g", "codegraph"]
    config:
      command: "codegraph"
      args: ["serve"]
    required: true
    tags: [code-analysis, search]

  - name: semble
    type: mcp
    description: 快速代码搜索，比 grep+read 节省 98% token
    source:
      github: "https://github.com/MinishLab/semble"
      pypi: "semble[mcp]"
    install:
      command: "uv"
      args: ["tool", "install", "semble"]
    config:
      command: "uvx"
      args: ["--from", "semble[mcp]", "semble"]
    required: true
    tags: [code-search, search, token-saving]

  - name: agentmemory
    type: mcp
    description: 持久记忆管理，支持会话历史、知识保存、提交追溯
    source:
      github: "https://github.com/rohitg00/agentmemory"
    config:
      command: "npx"
      args: ["-y", "agentmemory"]
    required: false
    tags: [memory, session, history]

  - name: context7
    type: mcp
    description: 实时文档查询，获取最新的库文档
    source:
      github: "https://github.com/upstash/context7"
    install:
      command: "npm"
      args: ["install", "-g", "@upstash/context7-mcp"]
    config:
      command: "npx"
      args: ["-y", "@upstash/context7-mcp"]
    required: false
    tags: [documentation, research]

  - name: playwright
    type: mcp
    description: 浏览器自动化，用于 E2E 测试和网页操作
    source:
      github: "https://github.com/anthropics/anthropic-quickstarts/tree/main/mcp-playwright"
    install:
      command: "npm"
      args: ["install", "-g", "@anthropic-ai/mcp-playwright"]
    config:
      command: "npx"
      args: ["-y", "@anthropic-ai/mcp-playwright"]
    required: false
    tags: [testing, browser, e2e]

  - name: agent-browser
    type: mcp
    description: AI Agent 浏览器，用于智能网页操作
    source:
      github: "https://github.com/anthropics/anthropic-quickstarts/tree/main/mcp-browser"
    install:
      command: "npm"
      args: ["install", "-g", "@anthropic-ai/mcp-browser"]
    config:
      command: "npx"
      args: ["-y", "@anthropic-ai/mcp-browser"]
    required: false
    tags: [browser, automation]

# ============================================================
# 工具
# ============================================================
tools:
  - name: uv
    type: tool
    description: Python 包管理器（推荐，用于安装 Semble 等）
    source:
      manual: "https://docs.astral.sh/uv/getting-started/installation/"
    install:
      script: "curl -LsSf https://astral.sh/uv/install.sh | sh"
    required: true
    tags: [python, package-manager]

  - name: docker
    type: tool
    description: 容器化工具
    source:
      manual: "https://docs.docker.com/get-docker/"
    required: true
    tags: [container, deployment]

  - name: git
    type: tool
    description: 版本控制
    source:
      brew: "git"
    required: true
    tags: [vcs]
